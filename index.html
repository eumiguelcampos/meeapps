<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mee Apps</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: url('https://images.unsplash.com/photo-1503264116251-35a269479413') no-repeat center center fixed;
      background-size: cover;
      overflow: hidden;
    }

    /* LOGIN */
    .login {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      z-index: 100;
    }

    .login-logo {
      width: 250px;
      margin-bottom: 20px;
      filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.2));
    }

    .login input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
      width: 200px;
      text-align: center;
      outline: none;
    }

    .login button {
      margin-top: 15px;
      padding: 12px 30px;
      border: none;
      background: #007aff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.2s;
    }

    .login button:hover {
      background: #005bb5;
    }

    /* DESKTOP */
    .desktop {
      display: none;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    /* TÍTULO / TOPBAR */
    .topbar {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 10px 20px;
      color: white;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
      font-size: 14px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }

    .topbar-logo {
      height: 20px;
      margin-right: 10px;
    }

    /* APPS */
    .apps {
      padding: 60px 30px 30px 30px;
      display: flex;
      gap: 40px;
    }

    .app {
      text-align: center;
      color: white;
      cursor: pointer;
      width: 100px;
      transition: transform 0.2s;
    }

    .app svg {
      width: 60px;
      height: 60px;
      fill: white;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
      margin-bottom: 8px;
    }

    .app:hover {
      transform: scale(1.05);
    }

    .app p {
      margin: 0;
      font-size: 13px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    }

    /* DOCK */
    .dock {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      padding: 12px 20px;
      border-radius: 20px;
      display: flex;
      gap: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .dock svg {
      width: 45px;
      height: 45px;
      fill: white;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .dock svg:hover {
      transform: scale(1.2) translateY(-5px);
    }
  </style>
</head>
