<!DOCTYPE html>
<html>
<head>
  <title>Mee Apps</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: url('https://images.unsplash.com/photo-1503264116251-35a269479413') no-repeat center center fixed;
      background-size: cover;
      overflow: hidden;
    }

    /* LOGIN */
    .login {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
    }

    .login input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    .login button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: #007aff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    /* DESKTOP */
    .desktop {
      display: none;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    .apps {
      padding: 30px;
      display: flex;
      gap: 30px;
    }

    .app {
      text-align: center;
      color: white;
      cursor: pointer;
    }

    .app img {
      width: 70px;
    }

    .app:hover {
      transform: scale(1.1);
    }

    /* DOCK */
    .dock {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 20px;
      display: flex;
      gap: 20px;
    }

    .dock img {
      width: 50px;
      cursor: pointer;
      transition: 0.2s;
    }

    .dock img:hover {
      transform: scale(1.3);
    }

    /* TÍTULO */
    .topbar {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 10px 20px;
      color: white;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>Mee Apps</h2>
  <input type="password" id="senha" placeholder="Digite a senha">
  <button onclick="verificar()">Entrar</button>
</div>

<!-- DESKTOP -->
<div class="desktop" id="desktop">

  <div class="topbar">Mee Apps</div>

  <div class="apps">

    <div class="app" onclick="abrir('MEE_Gestao_Produtos.html')">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
      <p>Gestão de Produtos</p>
    </div>

    <div class="app" onclick="abrir('MEE_Gestao_Produtos_v2.html')">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
      <p>Gestão de Produtos Mobile</p>
    </div>

  </div>

  <!-- DOCK -->
  <div class="dock">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png" onclick="abrir('MEE_Gestao_Produtos.html')">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png" onclick="abrir('MEE_Gestao_Produtos_v2.html')">
  </div>

</div>

<script>
const SENHA = "@Mee2026";

function verificar() {
  const input = document.getElementById("senha").value;

  if (input === SENHA) {
    document.getElementById("login").style.display = "none";
    document.getElementById("desktop").style.display = "block";
  } else {
    alert("Senha incorreta");
  }
}

function abrir(link) {
  window.open(link, "_blank");
}
</script>

</body>
</html>
