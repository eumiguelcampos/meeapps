<!DOCTYPE html>
<html>
<head>
  <title>Meus Apps</title>
  <style>
    body {
      margin: 0;
      background: #1e1e2f;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .apps {
      display: flex;
      justify-content: center;
      margin-top: 50px;
      gap: 40px;
    }

    .app {
      cursor: pointer;
    }

    .app img {
      width: 80px;
    }

    .app p {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Minha Área de Trabalho</h1>

<div class="apps">

  <div class="app" onclick="openApp('MEE_Gestao_Produtos.html')">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
    <p>Gestão Produtos</p>
  </div>

  <div class="app" onclick="openApp('MEE_Gestao_Produtos_v2.html')">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
    <p>Versão Mobile</p>
  </div>

</div>

<script>
function openApp(url) {
  window.open(url, '_blank');
}
</script>

</body>
</html>
